name: Daily Agent

# Cron 08:30 UTC Mon-Fri + manual. On failure (including spend/token caps),
# GitHub emails the workflow owner automatically — that is the "email on failure".
on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: US market holiday check
        id: holiday
        run: |
          today=$(date -u +%Y-%m-%d)
          # NYSE holidays 2026
          holidays="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25"
          if echo "$holidays" | grep -qw "$today"; then
            echo "US market holiday ($today) — skipping agent run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.holiday.outputs.skip == 'false'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Discover Function App host
        if: steps.holiday.outputs.skip == 'false'
        id: discover
        uses: azure/cli@v2
        with:
          inlineScript: |
            host=$(az functionapp list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "[0].defaultHostName" -o tsv)
            if [ -z "$host" ]; then
              echo "::error::No Function App found in $AZURE_RESOURCE_GROUP. Run the Infra workflow first."
              exit 1
            fi
            echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Trigger agent run
        if: steps.holiday.outputs.skip == 'false'
        run: |
          base="https://${{ steps.discover.outputs.host }}/api"
          echo "POST $base/agent/run"
          code=$(curl -s -X POST -o /tmp/body -w "%{http_code}" --max-time 300 "$base/agent/run" || true)
          echo "HTTP $code"
          cat /tmp/body || true
          echo ""

          # Pull the latest log entry (memo + tokens + cost) and publish it to the
          # job log + the run's Summary page (no email needed).
          curl -s --max-time 60 "$base/agent/log?limit=1" -o /tmp/log.json || true
          echo "----- latest agent log -----"
          jq '.runs[0] // {}' /tmp/log.json || cat /tmp/log.json
          {
            echo "## Agent run — $(date -u +%Y-%m-%d)"
            echo ""
            echo "Cumulative spend: \$$(jq -r '.cumulative_cost_usd // 0' /tmp/log.json) over $(jq -r '.total_runs // 0' /tmp/log.json) runs"
            echo ""
            echo '```json'
            jq '.runs[0] // {}' /tmp/log.json 2>/dev/null || cat /tmp/log.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$code" != "200" ]; then
            echo "::error::Agent run failed (HTTP $code)"
            exit 1
          fi
          # Surface cap states as failures so the owner gets the failure email.
          if grep -Eq '"status": *"(disabled|blocked)"' /tmp/body; then
            echo "::error::Agent halted by a cost guardrail (spend or token cap)"
            exit 1
          fi
