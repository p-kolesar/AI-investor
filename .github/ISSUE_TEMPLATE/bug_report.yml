name: Bug report
description: Report a bug. A maintainer adds the `bug` label to hand it to the auto-fixer.
title: "[Bug]: "
# Intentionally NO auto-label: a maintainer adds `bug` manually, which is the
# trigger gate for .github/workflows/auto-fix-bug.yml.
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! The clearer the repro, the more likely it can be fixed automatically.

        Nothing runs on submission — a maintainer adds the **`bug`** label when it's ready to be worked on.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What's wrong, in a sentence or two.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error message / stack trace if there is one.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area (best guess)
      options:
        - Unsure
        - Backend — agent (loop / prompts / tools)
        - Backend — market data (Finnhub)
        - Backend — trading / storage
        - Backend — HTTP endpoints
        - Frontend (dashboard)
        - Infra / CI
        - Docs
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Links, screenshots, or relevant code as `file.py:line`.
    validations:
      required: false
